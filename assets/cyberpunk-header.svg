<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Khulaifi cyberpunk profile banner</title>
  <desc id="desc">A subtle animated cyberpunk banner with neon grid lines and the text Khulaifi, student developer.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070B1A"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#050816"/>
    </linearGradient>

    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF2A6D"/>
      <stop offset="0.5" stop-color="#05D9E8"/>
      <stop offset="1" stop-color="#7B61FF"/>
    </linearGradient>

    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 104) rotate(90) scale(190)">
      <stop offset="0" stop-color="#05D9E8" stop-opacity="0.42"/>
      <stop offset="0.45" stop-color="#7B61FF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#050816" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" stroke="#05D9E8" stroke-opacity="0.16" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="18" fill="url(#glow)"/>

  <g opacity="0.9">
    <path d="M0 260H1200" stroke="url(#line)" stroke-width="2" filter="url(#softGlow)"/>
    <rect y="260" width="1200" height="100" fill="url(#grid)" opacity="0.65">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-60 0" dur="8s" repeatCount="indefinite"/>
    </rect>
    <path d="M220 360L520 260M470 360L610 260M730 360L680 260M990 360L770 260" stroke="#05D9E8" stroke-opacity="0.22"/>
  </g>

  <g opacity="0.72">
    <rect x="820" y="168" width="68" height="92" fill="#0B1023"/>
    <rect x="902" y="126" width="92" height="134" fill="#0B1023"/>
    <rect x="1010" y="152" width="74" height="108" fill="#0B1023"/>
    <rect x="1098" y="104" width="62" height="156" fill="#0B1023"/>
    <path d="M922 126L947 94L974 126" fill="#0B1023"/>
    <path d="M1112 104L1133 76L1152 104" fill="#0B1023"/>
  </g>

  <g filter="url(#softGlow)">
    <path d="M838 190H874M920 152H976M1026 178H1070M1112 128H1148" stroke="#05D9E8" stroke-width="3" stroke-linecap="round">
      <animate attributeName="opacity" values="0.35;1;0.55;1;0.35" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <path d="M840 216H864M930 178H946M960 178H976M1036 206H1062M1118 160H1142" stroke="#FF2A6D" stroke-width="3" stroke-linecap="round">
      <animate attributeName="opacity" values="1;0.4;1;0.5;1" dur="2.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <g>
    <rect x="72" y="76" width="552" height="156" rx="16" fill="#050816" fill-opacity="0.76" stroke="#1F2937"/>
    <rect x="96" y="100" width="80" height="8" rx="4" fill="#FF2A6D">
      <animate attributeName="width" values="80;132;80" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="96" y="124" width="210" height="8" rx="4" fill="#05D9E8" opacity="0.75"/>
    <rect x="96" y="148" width="150" height="8" rx="4" fill="#7B61FF" opacity="0.75"/>
  </g>

  <text x="96" y="197" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700" letter-spacing="0">Khulaifi</text>
  <text x="100" y="226" fill="#9CA3AF" font-family="Segoe UI, Arial, sans-serif" font-size="20">student developer · HTML · CSS · PHP</text>

  <g opacity="0.46">
    <path d="M72 284H360" stroke="url(#line)" stroke-width="3" stroke-linecap="round">
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M72 300H240" stroke="#05D9E8" stroke-width="3" stroke-linecap="round">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
